<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="submit">
        <label for="Name">Name</label>
        <input type="text" class="name" size="10" value="person"><br>
        <label for="submit">password</label>
        <input type="password" class="password" maxlength="15" required="@" size="10"><br>

        <input type="radio" id="male" name="gender" //value="male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" //value="female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" //value="other">
        <label for="other">other</label><br>

        <label for="tel">enter telephone number</label><br>
        <input type="tel" id="tel"><br>
        
        <label for="week">select the week</label>
        <input type="week" class="week"><br> 

        <input type="submit" value="submit"><br>

        <label for="Fruits">Fruits</label>
        <select name="fruits">
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="cherry">Cherry</option>
        </select><br>
        <label for="textarea">enter your feedback</label><br>
        <textarea name="Feedback" id="Feedback" cols="30" rows="10" placeholder="enter data"></textarea><br>
        <button class="submit ">submit</button>
    </form>
</body>

</html>
