<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .subscribe-button {
            background-color: rgb(181, 9, 9);
            color: white;
            height: 36px;
            width: 105px;
            border: none;
           border-radius: 3px;
        }
        .like-button{
            background-color: rgb(255, 255, 255);
            color: skyblue;
            width: 105px;
            height: 37px;
            border-radius: 3px;
            cursor: pointer;
            border-color: rgb(83, 83, 220);
        }
        .tweeter-button{
            background-color: rgb(44, 160, 209);
            color: white;
            border: none;
            width: 105px;
            height: 37px;
            border-radius: 20px;
            cursor: pointer;
            border-style: solid;
           
        }
    </style>
</head>
<body>
    <button class="subscribe-button">SUBSCRIBE</button>

    <button class="like-button">LIKE</button>

    <button class="tweeter-button">TWEETER</button>
</body>
</html>
